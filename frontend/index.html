<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Clipping</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 40px;
      border-bottom: 1px solid #161616;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span {
      background: linear-gradient(135deg, #fe2c55, #8a00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .beta {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      background: #1a1a1a; color: #666;
      padding: 3px 8px; border-radius: 100px;
      text-transform: uppercase;
    }

    /* ── Main layout ──────────────────────────────────────── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    /* ── Upload zone ──────────────────────────────────────── */
    .upload-zone {
      position: relative;
      border: 2px dashed #252525;
      border-radius: 20px;
      padding: 72px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #8a00ff;
      background: rgba(138, 0, 255, 0.04);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 52px; margin-bottom: 18px; line-height: 1; }
    .upload-zone h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .upload-zone p  { color: #555; font-size: 14px; }
    .upload-formats { margin-top: 14px; font-size: 12px; color: #383838; }

    /* ── Progress ─────────────────────────────────────────── */
    .progress-card {
      display: none;
      margin-top: 24px;
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 28px 32px;
    }
    .progress-card.visible { display: block; }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .progress-label { font-size: 14px; font-weight: 600; color: #bbb; }
    .progress-pct   { font-size: 20px; font-weight: 800; color: #8a00ff; }

    .bar-bg {
      background: #1a1a1a;
      border-radius: 100px;
      height: 5px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #8a00ff, #fe2c55);
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .progress-msg {
      margin-top: 10px;
      font-size: 12px;
      color: #444;
    }

    /* ── Error ────────────────────────────────────────────── */
    .error-card {
      display: none;
      margin-top: 20px;
      background: rgba(254, 44, 85, 0.06);
      border: 1px solid rgba(254, 44, 85, 0.2);
      border-radius: 12px;
      padding: 18px 24px;
      color: #fe6080;
      font-size: 14px;
    }
    .error-card.visible { display: block; }

    /* ── Clips section ────────────────────────────────────── */
    .clips-section {
      display: none;
      margin-top: 52px;
    }
    .clips-section.visible { display: block; }

    .clips-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .clips-header h2 { font-size: 20px; font-weight: 700; }

    .btn-dl-all {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #8a00ff, #fe2c55);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-dl-all:hover { opacity: 0.85; }

    /* ── Clip grid ────────────────────────────────────────── */
    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 18px;
    }

    .clip-card {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.18s, border-color 0.18s;
    }
    .clip-card:hover {
      transform: translateY(-3px);
      border-color: #2a2a2a;
    }

    /* Portrait 9:16 video wrapper */
    .video-wrap {
      position: relative;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      transition: opacity 0.2s;
    }
    .video-wrap:hover .play-overlay { opacity: 0; }
    .play-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      font-size: 16px;
    }

    .dur-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .num-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.75);
      color: #999;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .clip-meta {
      padding: 10px 12px 4px;
    }
    .clip-transcript {
      font-size: 11px;
      color: #444;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .clip-actions { padding: 8px 12px 12px; }
    .btn-dl {
      display: block;
      width: 100%;
      text-align: center;
      background: #161616;
      color: #777;
      text-decoration: none;
      padding: 7px 0;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .btn-dl:hover { background: #202020; color: #ccc; }

    /* ── Upload again ─────────────────────────────────────── */
    .btn-reset {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 36px;
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-reset:hover { border-color: #444; color: #aaa; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">✂ <span>AI Clipping</span></div>
  <span class="beta">Beta</span>
</header>

<main class="main">

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".mp4,.mov,.avi,.mkv,.webm" />
    <div class="upload-icon">🎬</div>
    <h2>Drop your video here</h2>
    <p>or click to browse files</p>
    <div class="upload-formats">MP4 · MOV · AVI · MKV · WebM &nbsp;·&nbsp; Up to 2 GB</div>
  </div>

  <!-- Progress -->
  <div class="progress-card" id="progressCard">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Processing</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <div class="progress-msg" id="progressMsg"></div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Clips -->
  <div class="clips-section" id="clipsSection">
    <div class="clips-header">
      <h2 id="clipsTitle">Clips</h2>
      <button class="btn-dl-all" id="btnDlAll">⬇ Download All</button>
    </div>
    <div class="clips-grid" id="clipsGrid"></div>
    <button class="btn-reset" id="btnReset">↩ Upload another video</button>
  </div>

</main>

<script>
  let jobId = null;
  let pollTimer = null;

  const uploadZone  = document.getElementById('uploadZone');
  const fileInput   = document.getElementById('fileInput');
  const progressCard = document.getElementById('progressCard');
  const bar         = document.getElementById('bar');
  const progressPct = document.getElementById('progressPct');
  const progressLabel = document.getElementById('progressLabel');
  const progressMsg = document.getElementById('progressMsg');
  const errorCard   = document.getElementById('errorCard');
  const clipsSection = document.getElementById('clipsSection');
  const clipsGrid   = document.getElementById('clipsGrid');
  const clipsTitle  = document.getElementById('clipsTitle');
  const btnDlAll    = document.getElementById('btnDlAll');
  const btnReset    = document.getElementById('btnReset');

  // ── Drag & drop ──────────────────────────────────────────

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) startUpload(f);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) startUpload(e.target.files[0]);
  });

  // ── Upload ───────────────────────────────────────────────

  async function startUpload(file) {
    resetUI();
    lockUpload();
    showProgress(2, 'Uploading', `Uploading ${file.name}...`);

    const fd = new FormData();
    fd.append('file', file);

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: fd });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || `HTTP ${res.status}`);
      }
      const data = await res.json();
      jobId = data.job_id;
      pollTimer = setInterval(poll, 2000);
    } catch (err) {
      showError('Upload failed: ' + err.message);
    }
  }

  // ── Polling ──────────────────────────────────────────────

  async function poll() {
    if (!jobId) return;
    try {
      const res = await fetch(`/api/status/${jobId}`);
      const data = await res.json();

      const labelMap = {
        uploading:    'Uploading',
        extracting:   'Extracting audio',
        transcribing: 'Transcribing',
        clipping:     'Building clips',
        rendering:    'Rendering',
        done:         'Done',
        error:        'Error',
      };
      showProgress(data.progress, labelMap[data.status] || data.status, data.message);

      if (data.status === 'done') {
        clearInterval(pollTimer);
        renderClips(data.clips);
        saveHistory(jobId, data.clips);
      } else if (data.status === 'error') {
        clearInterval(pollTimer);
        showError(data.message);
        unlockUpload();
      }
    } catch (err) {
      console.warn('Poll error:', err);
    }
  }

  // ── UI helpers ───────────────────────────────────────────

  function showProgress(pct, label, msg) {
    progressCard.classList.add('visible');
    bar.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    progressLabel.textContent = label;
    progressMsg.textContent = msg || '';
  }

  function showError(msg) {
    errorCard.textContent = '⚠ ' + msg;
    errorCard.classList.add('visible');
  }

  function lockUpload() {
    uploadZone.style.pointerEvents = 'none';
    uploadZone.style.opacity = '0.4';
  }
  function unlockUpload() {
    uploadZone.style.pointerEvents = '';
    uploadZone.style.opacity = '';
  }

  function resetUI() {
    errorCard.classList.remove('visible');
    errorCard.textContent = '';
    clipsSection.classList.remove('visible');
    clipsGrid.innerHTML = '';
    progressCard.classList.remove('visible');
  }

  // ── History ──────────────────────────────────────────────

  function saveHistory(currentJobId, clips) {
    try {
      localStorage.setItem('ai_clipping_history', JSON.stringify({ jobId: currentJobId, clips }));
    } catch (err) {
      console.warn('Failed to save history', err);
    }
  }

  function loadHistory() {
    try {
      const hist = localStorage.getItem('ai_clipping_history');
      if (hist) {
        const data = JSON.parse(hist);
        if (data && data.clips && data.clips.length > 0) {
          jobId = data.jobId;
          renderClips(data.clips);
        }
      }
    } catch (err) {
      console.warn('Failed to load history', err);
    }
  }

  // ── Render clips ─────────────────────────────────────────

  function renderClips(clips) {
    clipsTitle.textContent = `${clips.length} Clips`;
    clipsGrid.innerHTML = '';

    clips.forEach(clip => {
      clipsGrid.appendChild(buildClipCard(clip));
    });

    btnDlAll.onclick = () => { window.location.href = `/api/download/${jobId}`; };
    clipsSection.classList.add('visible');
    unlockUpload();
  }

  function buildClipCard(clip) {
    const card = document.createElement('div');
    card.className = 'clip-card';

    const dur = formatDuration(clip.duration);
    const safeTranscript = escapeHtml(clip.transcript);

    card.innerHTML = `
      <div class="video-wrap" data-src="${clip.url}">
        <video preload="none" loop muted playsinline></video>
        <div class="play-overlay">
          <div class="play-icon">▶</div>
        </div>
        <span class="num-badge">#${clip.index}</span>
        <span class="dur-badge">${dur}</span>
      </div>
      <div class="clip-meta">
        <div class="clip-transcript">${safeTranscript}</div>
      </div>
      <div class="clip-actions">
        <a class="btn-dl" href="${clip.url}" download="clip_${String(clip.index).padStart(3,'0')}.mp4">⬇ Download</a>
      </div>
    `;

    const wrap  = card.querySelector('.video-wrap');
    const video = card.querySelector('video');
    let loaded  = false;

    wrap.addEventListener('mouseenter', () => {
      if (!loaded) {
        video.src = clip.url;
        loaded = true;
      }
      video.play().catch(() => {});
    });
    wrap.addEventListener('mouseleave', () => {
      video.pause();
      video.currentTime = 0;
    });
    wrap.addEventListener('click', () => {
      if (video.paused) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
    });

    return card;
  }

  function formatDuration(secs) {
    const s = Math.round(secs);
    const m = Math.floor(s / 60);
    const r = s % 60;
    return m > 0 ? `${m}:${String(r).padStart(2,'0')}` : `${r}s`;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Reset ────────────────────────────────────────────────

  btnReset.addEventListener('click', () => {
    if (pollTimer) clearInterval(pollTimer);
    jobId = null;
    fileInput.value = '';
    resetUI();
    unlockUpload();
  });

  // Load history on startup
  loadHistory();
</script>
</body>
</html>
